    <!-- Brand mark — 6-blade aperture with gold hex center.

         icon for days even after a deploy). Bump when the mark changes. -->
    <link rel="icon" type="image/svg+xml" href="/brand/logo-mark.svg?v=2" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/brand/logo-mark-square.svg?v=2" />
    <link rel="mask-icon" href="/brand/logo-mark.svg?v=2" color="#0F172A" />
    <meta name="theme-color" content="#0F172A" />

    <meta property="og:title" content="MyCargoLens — CBP Compliance Platform" />
    <meta property="og:description" content="An inbox for US customs. Not another dashboard." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
