# ============================================================
# MyCargoLens — CI/CD Pipeline
# ============================================================
# Triggers: Push to main, Pull Requests
# Jobs: Lint → Test → Build → Docker Push → Deploy
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type check frontend
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Type check server
        working-directory: server
        run: npx tsc --noEmit --project tsconfig.build.json

  # ── Unit Tests ───────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Build Frontend ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ── Build & Push Docker Image ────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag with full commit SHA (for rollback) + latest (for convenience)
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (customize per hosting provider) ──────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (SHA-tagged, health-gated, auto-rollback)
        if: ${{ vars.DEPLOY_METHOD == 'ssh' }}
        uses: appleboy/ssh-action@v1
        env:
          NEW_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEW_TAG
          script: |
            set -euo pipefail
            cd /opt/mycargolens

            # ── Capture currently-deployed tag (rollback target) ──────────
            OLD_TAG=$(grep '^IMAGE_TAG=' .env | cut -d= -f2)
            echo "▶ Deploying ${NEW_TAG:0:12} (previous: ${OLD_TAG:0:12})"

            # ── Point compose at the new image ────────────────────────────
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${NEW_TAG}|" .env

            # ── Pull the new image; if it doesn't exist, revert and fail ──
            if ! docker compose pull server; then
              echo "❌ Pull failed — reverting .env"
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${OLD_TAG}|" .env
              exit 1
            fi

            # ── Restart server (Prisma migrations run via entrypoint) ─────
            docker compose up -d server

            # ── Wait for /api/health to respond 200 (60s max) ─────────────
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3001/api/health > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              sleep 2
            done

            # ── If unhealthy, roll back to previous tag ───────────────────
            if [ "$HEALTHY" != "true" ]; then
              echo "❌ Health check failed after 60s — rolling back to ${OLD_TAG:0:12}"
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${OLD_TAG}|" .env
              docker compose up -d server
              docker compose logs --tail=40 server || true
              exit 1
            fi

            echo "✅ Deploy healthy — ${NEW_TAG:0:12} is live"
            docker image prune -f
            docker compose ps

      - name: Deployment info (fallback when DEPLOY_METHOD unset)
        if: ${{ vars.DEPLOY_METHOD != 'ssh' }}
        run: |
          echo "🚀 Docker image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Auto-deploy is disabled. To enable:"
          echo "  gh variable set DEPLOY_METHOD --body ssh"
          echo "  gh secret set DEPLOY_HOST    # VPS IP"
          echo "  gh secret set DEPLOY_USER    # e.g. deploy"
          echo "  gh secret set DEPLOY_SSH_KEY # private key contents"
