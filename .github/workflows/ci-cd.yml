# ============================================================
# MyCargoLens — CI/CD Pipeline
# ============================================================
# Triggers: Push to main, Pull Requests
# Jobs: Lint → Test (frontend + server) → Docker Push → Deploy
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit lands — keeps
# us from piling up hung jobs and ensures "latest push" is always what deploys.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type check frontend
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Type check server
        working-directory: server
        run: npx tsc --noEmit --project tsconfig.build.json

  # ── Frontend Tests ───────────────────────────────────────
  # Runs `vitest --passWithNoTests` against src/. Currently a placeholder
  # job — no FE tests live in the repo today. Kept as a slot so we can
  # land FE tests without re-touching this workflow.
  test-frontend:
    name: Tests (frontend)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Server Tests ─────────────────────────────────────────
  # Pre-Phase-10 the only test job ran `npm test` at repo root, which only
  # matched src/test/example.test.ts (the tautology test, deleted in
  # Phase 1) — the two real server tests (validation.test.ts +
  # ccErrorMapping.test.ts) never ran on merges to main. Splitting into a
  # dedicated server job gives the high-quality tests an actual CI gate.
  test-server:
    name: Tests (server)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

  # ── Build & Push Docker Image ────────────────────────────
  # (The standalone "Build" job was removed — its artifact was never consumed,
  #  and the Docker job builds the frontend inside the container via Dockerfile
  #  stage `frontend-builder`. Keeping only this single build source of truth.)
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-frontend, test-server]
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag with full commit SHA (for rollback) + latest (for convenience)
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Landing Docker Image ─────────────────────
  docker-landing:
    name: Docker Build & Push (Landing)
    runs-on: ubuntu-latest
    needs: [test-frontend, test-server]
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-landing
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push landing
        uses: docker/build-push-action@v6
        with:
          context: ./landing
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  # ── Deploy (customize per hosting provider) ──────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker, docker-landing]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Copy the committed prod compose to the VPS BEFORE the ssh-action runs.
      # Replaces the old in-place sed-patching that lived inside the ssh
      # script — every env-var addition used to require editing both this
      # workflow AND the patching code on prod, which was the mechanism
      # that contributed to the 2026-06-01 outage (the empty-shell-env
      # override hazard lived in that same path).
      - name: Sync deploy/docker-compose.prod.yml to VPS
        if: ${{ vars.DEPLOY_METHOD == 'ssh' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/docker-compose.prod.yml
          target: /opt/mycargolens/
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH (SHA-tagged, health-gated, auto-rollback)
        if: ${{ vars.DEPLOY_METHOD == 'ssh' }}
        uses: appleboy/ssh-action@v1
        env:
          NEW_TAG: ${{ github.sha }}
          # AI provider env vars — sourced from GitHub repo secrets, written
          # into /opt/mycargolens/.env at the start of the deploy script so the
          # server container picks them up on the upcoming `docker compose up`.
          # Provider-agnostic naming: AI_PROVIDER chooses the backend (openai,
          # anthropic, etc.) and AI_API_KEY is the matching credential.
          AI_ASSESSMENT_ENABLED:    ${{ secrets.AI_ASSESSMENT_ENABLED }}
          AI_PROVIDER:              ${{ secrets.AI_PROVIDER }}
          AI_MODEL:                 ${{ secrets.AI_MODEL }}
          AI_API_KEY:               ${{ secrets.AI_API_KEY }}
          AI_MAX_TOKENS:            ${{ secrets.AI_MAX_TOKENS }}
          AI_TEMPERATURE:           ${{ secrets.AI_TEMPERATURE }}
          AI_RATE_LIMIT_PER_USER:   ${{ secrets.AI_RATE_LIMIT_PER_USER }}
          AI_DISABLE_TRAINING_DATA: ${{ secrets.AI_DISABLE_TRAINING_DATA }}
          # Terminal 49 (Container Tracking). Optional — the server self-disables
          # the feature when the key is blank.
          TERMINAL49_API_BASE_URL:  ${{ secrets.TERMINAL49_API_BASE_URL }}
          TERMINAL49_API_KEY:       ${{ secrets.TERMINAL49_API_KEY }}
          # Rotatable secrets. Each maps to a GitHub Secret of the same name.
          # `upsert_env` below skips empty values so a missing secret here does
          # NOT wipe a working VPS .env line — the founder can roll these in
          # one at a time as they rotate at the provider end.
          # (The sed-based wiring on these is interim. Phase 5 of the audit
          # plan replaces the whole mechanism with a committed compose.prod.yml
          # that pulls every env var from a single canonical source.)
          CC_API_TOKEN:             ${{ secrets.CC_API_TOKEN }}
          CC_ENVIRONMENT:           ${{ secrets.CC_ENVIRONMENT }}
          STRIPE_SECRET_KEY:        ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:    ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY:   ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          JWT_ACCESS_SECRET:        ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET:       ${{ secrets.JWT_REFRESH_SECRET }}
          EMAIL_USER:               ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:               ${{ secrets.EMAIL_PASS }}
          # Sentry (audit Phase 10). Server runtime DSN only — SPA / landing
          # client DSNs are baked into their bundles at build time, see
          # NEXT_PUBLIC_SENTRY_DSN / VITE_SENTRY_DSN docker build args
          # (those build paths are added in Phase 10b).
          SENTRY_DSN:               ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT:       ${{ secrets.SENTRY_ENVIRONMENT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEW_TAG,AI_ASSESSMENT_ENABLED,AI_PROVIDER,AI_MODEL,AI_API_KEY,AI_MAX_TOKENS,AI_TEMPERATURE,AI_RATE_LIMIT_PER_USER,AI_DISABLE_TRAINING_DATA,TERMINAL49_API_BASE_URL,TERMINAL49_API_KEY,CC_API_TOKEN,CC_ENVIRONMENT,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PUBLISHABLE_KEY,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,EMAIL_USER,EMAIL_PASS,SENTRY_DSN,SENTRY_ENVIRONMENT
          script: |
            set -euo pipefail
            cd /opt/mycargolens

            # ── Activate the just-scp'd compose file ─────────────────────
            # The scp-action step above dropped deploy/docker-compose.prod.yml
            # at /opt/mycargolens/docker-compose.prod.yml. Rename it into
            # place so `docker compose` picks it up. Atomic mv so a partial
            # transfer never leaves the running compose file in a half state.
            if [ -f docker-compose.prod.yml ]; then
              mv -f docker-compose.prod.yml docker-compose.yml
              echo "▶ Activated freshly-synced docker-compose.yml"
            else
              echo "⚠ No docker-compose.prod.yml found from scp step; keeping current docker-compose.yml"
            fi

            # ── Drop empty shell env vars so they don't override .env ──
            # `envs:` above forwards every listed GitHub Secret into this SSH
            # session's shell. A secret that isn't set in the repo evaluates
            # to "" — but it's STILL exported as an empty shell var. docker
            # compose's interpolation order is shell-env → .env, so the empty
            # shell var wins and overrides a perfectly valid .env value at
            # container-create time.
            #
            # This is what took prod down on 2026-06-01 (Phase 2 of the audit
            # added JWT_ACCESS_SECRET / JWT_REFRESH_SECRET to envs: before
            # the GitHub Secrets were populated → empty shell var → container
            # got empty JWT secrets → Zod rejected → crash-loop → rollback
            # ran into the same empty env → also crashed).
            #
            # Unsetting empties up-front means: if a secret is not in GitHub
            # Secrets, docker compose falls through to .env. The upsert_env
            # function below also short-circuits on empty so the .env file is
            # left untouched — the existing value continues to be used.
            for var in JWT_ACCESS_SECRET JWT_REFRESH_SECRET \
                       CC_API_TOKEN CC_ENVIRONMENT \
                       STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PUBLISHABLE_KEY \
                       EMAIL_USER EMAIL_PASS \
                       AI_API_KEY AI_ASSESSMENT_ENABLED AI_PROVIDER AI_MODEL \
                       AI_MAX_TOKENS AI_TEMPERATURE AI_RATE_LIMIT_PER_USER \
                       AI_DISABLE_TRAINING_DATA \
                       TERMINAL49_API_BASE_URL TERMINAL49_API_KEY; do
              # The :- handles the case where the var is unset entirely (set -u
              # would otherwise blow up here). If empty, unset it; printf the
              # outcome so deploy logs make the decision auditable.
              eval "current=\${$var:-}"
              if [ -z "$current" ]; then
                unset "$var" 2>/dev/null || true
                printf '%s\n' "▶ (unset) $var — falling through to .env"
              fi
            done

            # ── Sync AI_* env vars from GitHub Secrets into the VPS .env ──
            # Idempotent upsert: replace the line if it already exists, append
            # if it doesn't. Only touches lines prefixed with AI_ so other
            # secrets (CC_*, STRIPE_*, etc.) are never modified. Empty values
            # from secrets are skipped so a misconfigured secret can't wipe a
            # working line.
            upsert_env() {
              local key="$1" val="$2"
              [ -z "$val" ] && return 0
              if grep -q "^${key}=" .env; then
                # Use a delimiter unlikely in API keys; escape only the
                # replacement-side backslashes & ampersands.
                local escaped
                escaped=$(printf '%s' "$val" | sed -e 's/[\\&|]/\\&/g')
                sed -i "s|^${key}=.*|${key}=${escaped}|" .env
              else
                printf '%s=%s\n' "$key" "$val" >> .env
              fi
            }
            upsert_env AI_ASSESSMENT_ENABLED "${AI_ASSESSMENT_ENABLED:-}"
            upsert_env AI_PROVIDER "${AI_PROVIDER:-}"
            upsert_env AI_MODEL "${AI_MODEL:-}"
            upsert_env AI_API_KEY "${AI_API_KEY:-}"
            upsert_env AI_MAX_TOKENS "${AI_MAX_TOKENS:-}"
            upsert_env AI_TEMPERATURE "${AI_TEMPERATURE:-}"
            upsert_env AI_RATE_LIMIT_PER_USER "${AI_RATE_LIMIT_PER_USER:-}"
            upsert_env AI_DISABLE_TRAINING_DATA "${AI_DISABLE_TRAINING_DATA:-}"
            upsert_env TERMINAL49_API_BASE_URL "${TERMINAL49_API_BASE_URL:-}"
            upsert_env TERMINAL49_API_KEY "${TERMINAL49_API_KEY:-}"
            # Rotatable secrets — each upsert is a no-op when the matching
            # GitHub Secret is unset, so this is safe to merge before all of
            # them are populated.
            upsert_env CC_API_TOKEN "${CC_API_TOKEN:-}"
            upsert_env CC_ENVIRONMENT "${CC_ENVIRONMENT:-}"
            upsert_env STRIPE_SECRET_KEY "${STRIPE_SECRET_KEY:-}"
            upsert_env STRIPE_WEBHOOK_SECRET "${STRIPE_WEBHOOK_SECRET:-}"
            upsert_env STRIPE_PUBLISHABLE_KEY "${STRIPE_PUBLISHABLE_KEY:-}"
            upsert_env JWT_ACCESS_SECRET "${JWT_ACCESS_SECRET:-}"
            upsert_env JWT_REFRESH_SECRET "${JWT_REFRESH_SECRET:-}"
            upsert_env EMAIL_USER "${EMAIL_USER:-}"
            upsert_env EMAIL_PASS "${EMAIL_PASS:-}"
            upsert_env SENTRY_DSN "${SENTRY_DSN:-}"
            upsert_env SENTRY_ENVIRONMENT "${SENTRY_ENVIRONMENT:-}"
            echo "▶ AI_* + TERMINAL49_* + rotatable secrets synced from GitHub Secrets"

            # The compose file is now sourced verbatim from
            # deploy/docker-compose.prod.yml (scp'd in the previous step
            # of this job). The old "patch docker-compose.yml in place"
            # block — which inserted AI_* / TERMINAL49_* env var lines
            # after EMAIL_FROM_NAME — is no longer needed: every env var
            # the server reads is enumerated in the committed file.
            # See Phase 5 of the audit hardening plan.

            # ── Capture currently-deployed tags (rollback targets) ─────────
            OLD_TAG=$(grep '^IMAGE_TAG=' .env | cut -d= -f2)
            OLD_LANDING_TAG=$(grep '^LANDING_IMAGE_TAG=' .env | cut -d= -f2 || echo "latest")
            echo "▶ Deploying ${NEW_TAG:0:12} (previous server: ${OLD_TAG:0:12}, landing: ${OLD_LANDING_TAG:0:12})"

            # ── Point compose at the new images ───────────────────────────
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${NEW_TAG}|" .env
            sed -i "s|^LANDING_IMAGE_TAG=.*|LANDING_IMAGE_TAG=${NEW_TAG}|" .env

            # ── Pull both images ──────────────────────────────────────────
            if ! docker compose pull server landing; then
              echo "❌ Pull failed — reverting .env"
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${OLD_TAG}|" .env
              sed -i "s|^LANDING_IMAGE_TAG=.*|LANDING_IMAGE_TAG=${OLD_LANDING_TAG}|" .env
              exit 1
            fi

            # ── Restart both services ─────────────────────────────────────
            docker compose up -d server landing

            # ── Wait for server /api/health (60s max) ─────────────────────
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3001/api/health > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "❌ Server health check failed — rolling back"
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${OLD_TAG}|" .env
              sed -i "s|^LANDING_IMAGE_TAG=.*|LANDING_IMAGE_TAG=${OLD_LANDING_TAG}|" .env
              docker compose up -d server landing
              docker compose logs --tail=40 server || true
              exit 1
            fi

            # ── Wait for landing health (30s max) ─────────────────────────
            LANDING_OK=false
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
                LANDING_OK=true
                break
              fi
              sleep 2
            done

            if [ "$LANDING_OK" != "true" ]; then
              echo "⚠️ Landing health check failed — server is live but landing may need attention"
              docker compose logs --tail=20 landing || true
              # Don't roll back server — it's healthy. Just warn.
            fi

            echo "✅ Deploy complete — server + landing live (${NEW_TAG:0:12})"
            docker image prune -f
            docker compose ps

      - name: Deployment info (fallback when DEPLOY_METHOD unset)
        if: ${{ vars.DEPLOY_METHOD != 'ssh' }}
        run: |
          echo "🚀 Docker image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Auto-deploy is disabled. To enable:"
          echo "  gh variable set DEPLOY_METHOD --body ssh"
          echo "  gh secret set DEPLOY_HOST    # VPS IP"
          echo "  gh secret set DEPLOY_USER    # e.g. deploy"
          echo "  gh secret set DEPLOY_SSH_KEY # private key contents"
