# ============================================================
# MyCargoLens — CI/CD Pipeline
# ============================================================
# Triggers: Push to main, Pull Requests
# Jobs: Lint → Test → Build → Docker Push → Deploy
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit lands — keeps
# us from piling up hung jobs and ensures "latest push" is always what deploys.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type check frontend
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Type check server
        working-directory: server
        run: npx tsc --noEmit --project tsconfig.build.json

  # ── Unit Tests ───────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Build & Push Docker Image ────────────────────────────
  # (The standalone "Build" job was removed — its artifact was never consumed,
  #  and the Docker job builds the frontend inside the container via Dockerfile
  #  stage `frontend-builder`. Keeping only this single build source of truth.)
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag with full commit SHA (for rollback) + latest (for convenience)
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Landing Docker Image ─────────────────────
  docker-landing:
    name: Docker Build & Push (Landing)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-landing
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push landing
        uses: docker/build-push-action@v6
        with:
          context: ./landing
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  # ── Deploy (customize per hosting provider) ──────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker, docker-landing]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (SHA-tagged, health-gated, auto-rollback)
        if: ${{ vars.DEPLOY_METHOD == 'ssh' }}
        uses: appleboy/ssh-action@v1
        env:
          NEW_TAG: ${{ github.sha }}
          # AI provider env vars — sourced from GitHub repo secrets, written
          # into /opt/mycargolens/.env at the start of the deploy script so the
          # server container picks them up on the upcoming `docker compose up`.
          # Provider-agnostic naming: AI_PROVIDER chooses the backend (openai,
          # anthropic, etc.) and AI_API_KEY is the matching credential.
          AI_ASSESSMENT_ENABLED:    ${{ secrets.AI_ASSESSMENT_ENABLED }}
          AI_PROVIDER:              ${{ secrets.AI_PROVIDER }}
          AI_MODEL:                 ${{ secrets.AI_MODEL }}
          AI_API_KEY:               ${{ secrets.AI_API_KEY }}
          AI_MAX_TOKENS:            ${{ secrets.AI_MAX_TOKENS }}
          AI_TEMPERATURE:           ${{ secrets.AI_TEMPERATURE }}
          AI_RATE_LIMIT_PER_USER:   ${{ secrets.AI_RATE_LIMIT_PER_USER }}
          AI_DISABLE_TRAINING_DATA: ${{ secrets.AI_DISABLE_TRAINING_DATA }}
          # Terminal 49 (Container Tracking). Optional — the server self-disables
          # the feature when the key is blank.
          TERMINAL49_API_BASE_URL:  ${{ secrets.TERMINAL49_API_BASE_URL }}
          TERMINAL49_API_KEY:       ${{ secrets.TERMINAL49_API_KEY }}
          # Rotatable secrets. Each maps to a GitHub Secret of the same name.
          # `upsert_env` below skips empty values so a missing secret here does
          # NOT wipe a working VPS .env line — the founder can roll these in
          # one at a time as they rotate at the provider end.
          # (The sed-based wiring on these is interim. Phase 5 of the audit
          # plan replaces the whole mechanism with a committed compose.prod.yml
          # that pulls every env var from a single canonical source.)
          CC_API_TOKEN:             ${{ secrets.CC_API_TOKEN }}
          CC_ENVIRONMENT:           ${{ secrets.CC_ENVIRONMENT }}
          STRIPE_SECRET_KEY:        ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:    ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY:   ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          JWT_ACCESS_SECRET:        ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET:       ${{ secrets.JWT_REFRESH_SECRET }}
          EMAIL_USER:               ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:               ${{ secrets.EMAIL_PASS }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEW_TAG,AI_ASSESSMENT_ENABLED,AI_PROVIDER,AI_MODEL,AI_API_KEY,AI_MAX_TOKENS,AI_TEMPERATURE,AI_RATE_LIMIT_PER_USER,AI_DISABLE_TRAINING_DATA,TERMINAL49_API_BASE_URL,TERMINAL49_API_KEY,CC_API_TOKEN,CC_ENVIRONMENT,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PUBLISHABLE_KEY,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,EMAIL_USER,EMAIL_PASS
          script: |
            set -euo pipefail
            cd /opt/mycargolens

            # ── Sync AI_* env vars from GitHub Secrets into the VPS .env ──
            # Idempotent upsert: replace the line if it already exists, append
            # if it doesn't. Only touches lines prefixed with AI_ so other
            # secrets (CC_*, STRIPE_*, etc.) are never modified. Empty values
            # from secrets are skipped so a misconfigured secret can't wipe a
            # working line.
            upsert_env() {
              local key="$1" val="$2"
              [ -z "$val" ] && return 0
              if grep -q "^${key}=" .env; then
                # Use a delimiter unlikely in API keys; escape only the
                # replacement-side backslashes & ampersands.
                local escaped
                escaped=$(printf '%s' "$val" | sed -e 's/[\\&|]/\\&/g')
                sed -i "s|^${key}=.*|${key}=${escaped}|" .env
              else
                printf '%s=%s\n' "$key" "$val" >> .env
              fi
            }
            upsert_env AI_ASSESSMENT_ENABLED    "$AI_ASSESSMENT_ENABLED"
            upsert_env AI_PROVIDER              "$AI_PROVIDER"
            upsert_env AI_MODEL                 "$AI_MODEL"
            upsert_env AI_API_KEY               "$AI_API_KEY"
            upsert_env AI_MAX_TOKENS            "$AI_MAX_TOKENS"
            upsert_env AI_TEMPERATURE           "$AI_TEMPERATURE"
            upsert_env AI_RATE_LIMIT_PER_USER   "$AI_RATE_LIMIT_PER_USER"
            upsert_env AI_DISABLE_TRAINING_DATA "$AI_DISABLE_TRAINING_DATA"
            upsert_env TERMINAL49_API_BASE_URL  "$TERMINAL49_API_BASE_URL"
            upsert_env TERMINAL49_API_KEY       "$TERMINAL49_API_KEY"
            # Rotatable secrets — each upsert is a no-op when the matching
            # GitHub Secret is unset, so this is safe to merge before all of
            # them are populated.
            upsert_env CC_API_TOKEN             "$CC_API_TOKEN"
            upsert_env CC_ENVIRONMENT           "$CC_ENVIRONMENT"
            upsert_env STRIPE_SECRET_KEY        "$STRIPE_SECRET_KEY"
            upsert_env STRIPE_WEBHOOK_SECRET    "$STRIPE_WEBHOOK_SECRET"
            upsert_env STRIPE_PUBLISHABLE_KEY   "$STRIPE_PUBLISHABLE_KEY"
            upsert_env JWT_ACCESS_SECRET        "$JWT_ACCESS_SECRET"
            upsert_env JWT_REFRESH_SECRET       "$JWT_REFRESH_SECRET"
            upsert_env EMAIL_USER               "$EMAIL_USER"
            upsert_env EMAIL_PASS               "$EMAIL_PASS"
            echo "▶ AI_* + TERMINAL49_* + rotatable secrets synced from GitHub Secrets"

            # ── Patch docker-compose.yml to forward AI_* into the server ──
            # The VPS compose has an `environment:` block under the server
            # service that enumerates which env vars get into the container.
            # If AI_API_KEY isn't enumerated, the container never sees it
            # even though it's in .env. We insert the AI_* lines after the
            # EMAIL_FROM_NAME line ONCE (idempotent — grep guard prevents
            # re-inserts on subsequent deploys).
            #
            # Heredoc uses 'BLOCK' (quoted) so ${...} stays literal — the
            # compose file needs the placeholders so it can pull from .env.
            if [ -f docker-compose.yml ]; then
              if ! grep -qE '^[[:space:]]+AI_API_KEY:' docker-compose.yml; then
                # printf-per-line keeps every script line at the YAML block's
                # indent. Single-quoted strings preserve ${...} placeholders
                # so they reach docker-compose unexpanded.
                printf '%s\n' \
                  '      AI_ASSESSMENT_ENABLED:    ${AI_ASSESSMENT_ENABLED:-false}' \
                  '      AI_PROVIDER:              ${AI_PROVIDER:-openai}' \
                  '      AI_MODEL:                 ${AI_MODEL:-gpt-4o-mini}' \
                  '      AI_API_KEY:               ${AI_API_KEY:-}' \
                  '      AI_MAX_TOKENS:            ${AI_MAX_TOKENS:-2048}' \
                  '      AI_TEMPERATURE:           ${AI_TEMPERATURE:-0.3}' \
                  '      AI_RATE_LIMIT_PER_USER:   ${AI_RATE_LIMIT_PER_USER:-50}' \
                  '      AI_DISABLE_TRAINING_DATA: ${AI_DISABLE_TRAINING_DATA:-true}' \
                  '      TERMINAL49_API_BASE_URL:  ${TERMINAL49_API_BASE_URL:-https://api.terminal49.com/v2}' \
                  '      TERMINAL49_API_KEY:       ${TERMINAL49_API_KEY:-}' \
                  > /tmp/ai_compose_block
                # Anchor on EMAIL_FROM_NAME — the last env var in the existing
                # server.environment block. `sed r FILE` reads & appends after match.
                cp docker-compose.yml docker-compose.yml.bak
                sed -i '/^      EMAIL_FROM_NAME:/r /tmp/ai_compose_block' docker-compose.yml
                rm -f /tmp/ai_compose_block
                echo "▶ Patched docker-compose.yml — AI_* env vars now forwarded into server container"
              else
                echo "▶ docker-compose.yml already enumerates AI_* — skipping patch"
              fi

              # ── Terminal 49 env vars (separate guard) ──
              # The AI_* guard above is skipped on every deploy after the very
              # first one, so we can't piggyback on it. Independent grep here
              # so TERMINAL49_* lands the first time without disturbing the
              # already-patched AI_* block.
              if ! grep -qE '^[[:space:]]+TERMINAL49_API_KEY:' docker-compose.yml; then
                printf '%s\n' \
                  '      TERMINAL49_API_BASE_URL:  ${TERMINAL49_API_BASE_URL:-https://api.terminal49.com/v2}' \
                  '      TERMINAL49_API_KEY:       ${TERMINAL49_API_KEY:-}' \
                  > /tmp/t49_compose_block
                cp docker-compose.yml docker-compose.yml.bak
                # Anchor on AI_DISABLE_TRAINING_DATA (the last AI_* line) so
                # the T49 lines sit immediately after the AI block. Fall back
                # to EMAIL_FROM_NAME if AI_* was never patched (fresh box).
                if grep -qE '^[[:space:]]+AI_DISABLE_TRAINING_DATA:' docker-compose.yml; then
                  sed -i '/^      AI_DISABLE_TRAINING_DATA:/r /tmp/t49_compose_block' docker-compose.yml
                else
                  sed -i '/^      EMAIL_FROM_NAME:/r /tmp/t49_compose_block' docker-compose.yml
                fi
                rm -f /tmp/t49_compose_block
                echo "▶ Patched docker-compose.yml — TERMINAL49_* env vars now forwarded into server container"
              else
                echo "▶ docker-compose.yml already enumerates TERMINAL49_* — skipping patch"
              fi
            else
              echo "⚠ docker-compose.yml not found at /opt/mycargolens — skipping compose patches"
            fi

            # ── Capture currently-deployed tags (rollback targets) ─────────
            OLD_TAG=$(grep '^IMAGE_TAG=' .env | cut -d= -f2)
            OLD_LANDING_TAG=$(grep '^LANDING_IMAGE_TAG=' .env | cut -d= -f2 || echo "latest")
            echo "▶ Deploying ${NEW_TAG:0:12} (previous server: ${OLD_TAG:0:12}, landing: ${OLD_LANDING_TAG:0:12})"

            # ── Point compose at the new images ───────────────────────────
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${NEW_TAG}|" .env
            sed -i "s|^LANDING_IMAGE_TAG=.*|LANDING_IMAGE_TAG=${NEW_TAG}|" .env

            # ── Pull both images ──────────────────────────────────────────
            if ! docker compose pull server landing; then
              echo "❌ Pull failed — reverting .env"
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${OLD_TAG}|" .env
              sed -i "s|^LANDING_IMAGE_TAG=.*|LANDING_IMAGE_TAG=${OLD_LANDING_TAG}|" .env
              exit 1
            fi

            # ── Restart both services ─────────────────────────────────────
            docker compose up -d server landing

            # ── Wait for server /api/health (60s max) ─────────────────────
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3001/api/health > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "❌ Server health check failed — rolling back"
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${OLD_TAG}|" .env
              sed -i "s|^LANDING_IMAGE_TAG=.*|LANDING_IMAGE_TAG=${OLD_LANDING_TAG}|" .env
              docker compose up -d server landing
              docker compose logs --tail=40 server || true
              exit 1
            fi

            # ── Wait for landing health (30s max) ─────────────────────────
            LANDING_OK=false
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
                LANDING_OK=true
                break
              fi
              sleep 2
            done

            if [ "$LANDING_OK" != "true" ]; then
              echo "⚠️ Landing health check failed — server is live but landing may need attention"
              docker compose logs --tail=20 landing || true
              # Don't roll back server — it's healthy. Just warn.
            fi

            echo "✅ Deploy complete — server + landing live (${NEW_TAG:0:12})"
            docker image prune -f
            docker compose ps

      - name: Deployment info (fallback when DEPLOY_METHOD unset)
        if: ${{ vars.DEPLOY_METHOD != 'ssh' }}
        run: |
          echo "🚀 Docker image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Auto-deploy is disabled. To enable:"
          echo "  gh variable set DEPLOY_METHOD --body ssh"
          echo "  gh secret set DEPLOY_HOST    # VPS IP"
          echo "  gh secret set DEPLOY_USER    # e.g. deploy"
          echo "  gh secret set DEPLOY_SSH_KEY # private key contents"
