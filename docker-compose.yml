# ============================================================
# MyCargoLens — Docker Compose (Dev + Production)
# ============================================================
# Usage:
#   Development:  docker compose up
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Seed DB:      docker compose exec server npx tsx prisma/seed.ts
# ============================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mycargolens-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mycargolens
      POSTGRES_USER: mycargolens
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mycargolens_dev_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycargolens -d mycargolens"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API Server ───────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: mycargolens-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://mycargolens:${DB_PASSWORD:-mycargolens_dev_password}@db:5432/mycargolens?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      CC_API_BASE_URL: ${CC_API_BASE_URL:-https://api-cert.customscity.com}
      CC_API_TOKEN: ${CC_API_TOKEN:-}
      CC_ENVIRONMENT: ${CC_ENVIRONMENT:-sandbox}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.azurecomm.net}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@mycargolens.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-MyCargoLens}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
