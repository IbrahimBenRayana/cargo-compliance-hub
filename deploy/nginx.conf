# ============================================================
# MyCargoLens — Nginx Reverse Proxy Configuration
# ============================================================
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/mycargolens
#          sudo ln -s /etc/nginx/sites-available/mycargolens /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL with Certbot:
#   sudo certbot --nginx -d your-domain.com
# ============================================================

server {
    listen 80;
    server_name your-domain.com;  # ← Change to your domain

    # Redirect HTTP to HTTPS (uncomment after Certbot setup)
    # return 301 https://$host$request_uri;

    # ── Proxy to MyCargoLens container ─────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── File upload limit ──────────────────────────────────
    client_max_body_size 50M;

    # ── Static asset caching ───────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check (no logging) ──────────────────────────
    location = /api/health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        access_log off;
    }
}

